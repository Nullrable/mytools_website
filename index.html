<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Migrated</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 { color: #2c3e50; margin-bottom: 20px; }
    p { line-height: 1.6; color: #666; }
    .link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
    }
    .link:hover { background: #2980b9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Migrated</h1>
    <p>This website has been migrated to a new address.</p>
    <p>Please visit the new site:</p>
    <a href="https://mytools.host" class="link">mytools.host →</a>
  </div>
</body>
</html>
